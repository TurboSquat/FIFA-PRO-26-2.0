<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Upload 2014 para Firestore</title>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyCPWDIHK5yeEEW75lY_Y15Ir23hXagKhy4",
      authDomain: "fifarinhas-26.firebaseapp.com",
      projectId: "fifarinhas-26",
      storageBucket: "fifarinhas-26.firebasestorage.app",
      messagingSenderId: "1053411125609",
      appId: "1:1053411125609:web:baefa77d83d8bb89ad35f8"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
  </script>
  <script src="teams2014.js"></script>
  <style>
    body { font-family: Arial; max-width: 600px; margin: 40px auto; padding: 20px; background: #1a1a2e; color: #fff; }
    button { padding: 12px 24px; font-size: 16px; cursor: pointer; border: none; border-radius: 8px; margin: 8px; }
    .upload-btn { background: #4CAF50; color: white; }
    .upload-btn:hover { background: #45a049; }
    #log { margin-top: 20px; padding: 16px; background: #16213e; border-radius: 8px; white-space: pre-wrap; font-size: 14px; }
    h1 { color: #e94560; }
  </style>
</head>
<body>
  <h1>Upload 2014 para Firestore</h1>
  <p>Faz upload dos dados das equipas de 2014 (já agrupados por grupo) para Firestore.</p>
  <button class="upload-btn" onclick="upload2014()">📤 Upload 2014</button>
  <div id="log">Pronto.</div>

  <script>
    function log(msg) {
      const el = document.getElementById('log');
      el.textContent += '\n' + msg;
      el.scrollTop = el.scrollHeight;
    }

    async function upload2014() {
      if (typeof teams2014_data === 'undefined') { log('ERRO: teams2014.js não carregado'); return; }
      const groups = Object.keys(teams2014_data).sort();
      log(`\n--- Upload 2014 ---`);
      let totalTeams = 0, totalPlayers = 0;
      for (const g of groups) {
        const docData = teams2014_data[g];
        await db.collection('teams').doc(`2014_${g}`).set(docData);
        totalTeams += docData.teams.length;
        docData.teams.forEach(t => totalPlayers += t.players.length);
        log(`✅ Grupo ${g}: ${docData.teams.length} equipas`);
      }
      await db.collection('teams').doc(`2014_meta`).set({
        totalTeams: totalTeams,
        totalPlayers: totalPlayers,
        groups: groups,
        uploadedAt: firebase.firestore.FieldValue.serverTimestamp()
      });
      log(`✅ Meta: ${totalTeams} equipas, ${totalPlayers} jogadores`);
      log(`--- Upload 2014 concluído! ---`);
    }
  </script>
</body>
</html>
